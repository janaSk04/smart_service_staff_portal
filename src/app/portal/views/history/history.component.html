<div class="dash-view active">
  <div class="page-title">
    <h1>Job History</h1>
    <p>Your completed job records</p>
  </div>

  <div class="kpi-row history-kpi">
    <div class="kpi-card" *ngFor="let stat of stats">
      <div class="kpi-val" [style.color]="stat.color">{{ stat.value }}</div>
      <div class="kpi-label">{{ stat.label }}</div>
    </div>
  </div>

  <div class="job-filters">
    <button
      type="button"
      class="btn btn-sm"
      *ngFor="let filter of filters"
      [class.btn-accent]="isPeriodActive(filter.id)"
      [class.btn-outline]="!isPeriodActive(filter.id)"
      (click)="setPeriod(filter.id)"
    >{{ filter.label }}</button>
  </div>

  <div class="history-card" *ngFor="let record of records">
    <div class="history-card-head">
      <div>
        <div class="job-title">{{ record.service }}</div>
        <div class="job-id">{{ record.id }}</div>
      </div>
      <span class="badge badge-green">Completed</span>
    </div>
    <div class="job-meta">
      <div class="job-meta-item"><i class="fa-solid fa-user"></i> {{ record.customer }}</div>
      <div class="job-meta-item"><i class="fa-solid fa-location-dot"></i> {{ record.address }}</div>
      <div class="job-meta-item"><i class="fa-solid fa-clock"></i> {{ record.completedAt }}</div>
      <div class="job-meta-item"><i class="fa-solid fa-coins"></i> {{ record.amount }}</div>
    </div>
    <div class="history-card-foot">
      <div class="history-rating">
        <span class="history-stars">{{ stars(record.rating) }}</span>
        <span class="history-rating-val">{{ record.rating }}</span>
      </div>
      <button type="button" class="btn btn-outline btn-sm" (click)="viewReceipt(record)">
        <i class="fa-solid fa-receipt"></i> View Receipt
      </button>
    </div>
  </div>

  <div class="empty-jobs" *ngIf="records.length === 0">
    <i class="fa-solid fa-clock-rotate-left"></i>
    <p>No completed jobs for this period.</p>
  </div>
</div>
