<div class="uc-page">
  <div class="uc-card">
    <div class="uc-code">404</div>
    <div class="uc-icon" aria-hidden="true">
      <i class="fa-solid fa-person-digging"></i>
    </div>
    <h1>Under Construction</h1>
    <p>Job site navigation (Google Maps) is not available yet. This page is a placeholder until that feature is built.</p>
    <p class="uc-address" *ngIf="address">

      {{ address }}

    <div class="uc-actions">
      <a routerLink="/portal/jobs" class="btn btn-accent btn-sm">Back to My Jobs</a>
      <a routerLink="/portal/schedule" class="btn btn-outline btn-sm">Schedule</a>
    </div>
  </div>
</div>
